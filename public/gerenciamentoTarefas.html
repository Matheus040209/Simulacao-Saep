<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerenciar Tarefas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
  <header class="d-flex justify-content-center py-3">
    <ul class="nav nav-pills">
      <li class="nav-item"><a href="./index.html" class="nav-link active">Inicio</a></li>
      <li class="nav-item"><a href="./cadastroUsuarios.html" class="nav-link">Cadastro de Usuarios</a></li>
      <li class="nav-item"><a href="./cadastroTarefas.html" class="nav-link">Cadastro de Tarefas</a></li>
      <li class="nav-item"><a href="./gerenciamentoTarefas.html" class="nav-link">Gerenciar Tarefas</a></li>
    </ul>
  </header>

  <div class="container py-5">
    <h2 class="text-center mb-4">Gerenciar Tarefas</h2>
    <div class="row g-4">
      <div class="col-md-4">
        <h4 class="text-center">A Fazer</h4>
        <div id="tarefas-afazer"></div>
      </div>
      <div class="col-md-4">
        <h4 class="text-center">Fazendo</h4>
        <div id="tarefas-fazendo"></div>
      </div>
      <div class="col-md-4">
        <h4 class="text-center">Pronto</h4>
        <div id="tarefas-pronto"></div>
      </div>
    </div>
  </div>

  <!-- MODAL DE EDIÇÃO -->
  <div class="modal fade" id="modalEditarTarefa" tabindex="-1" aria-labelledby="modalEditarTarefaLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalEditarTarefaLabel">Editar Tarefa</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="formEditarTarefa">
            <div class="mb-3">
              <label for="inputDescricao" class="form-label">Descrição</label>
              <input type="text" class="form-control" id="inputDescricao" required>
            </div>
            <div class="mb-3">
              <label for="inputSetor" class="form-label">Setor</label>
              <input type="text" class="form-control" id="inputSetor" required>
            </div>
            <div class="mb-3">
              <label for="inputPrioridade" class="form-label">Prioridade</label>
              <select class="form-select" id="inputPrioridade" required>
                <option value="baixa">Baixa</option>
                <option value="media">Média</option>
                <option value="alta">Alta</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="inputStatus" class="form-label">Status</label>
              <select class="form-select" id="inputStatus" required>
                <option value="a fazer">A Fazer</option>
                <option value="fazendo">Fazendo</option>
                <option value="pronto">Pronto</option>
              </select>
            </div>
            <input type="hidden" id="idTarefaEditar">
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btnSalvarEdicao">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./gerenciamentoTarefas.js"></script>
</body>
</html>
